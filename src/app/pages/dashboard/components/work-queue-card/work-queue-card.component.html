<a [routerLink]="'/case/' + caseItem.id" class="dashboard-queue-card">
  <div class="dashboard-queue-card__main">
    <div class="dashboard-queue-card__header">
      <span class="dashboard-queue-card__name">{{ caseItem.name }}</span>
      <span
        [class]="
          'dashboard-queue-card__date' +
          (isOverdue ? ' dashboard-queue-card__date--overdue' : '')
        "
      >
        {{ isOverdue ? "OVERDUE" : caseItem.dueDate || "No date" }}
      </span>
    </div>
    <div class="dashboard-queue-card__badges">
      @if (caseItem.priority) {
        <goabx-badge
          [type]="caseItem.priority | priorityBadgeType"
          [content]="caseItem.priority | titlecase"
        />
      }
      <goabx-badge
        [type]="caseItem.status"
        [content]="caseItem.statusText"
        emphasis="subtle"
        [icon]="true"
      />
    </div>
  </div>
</a>
