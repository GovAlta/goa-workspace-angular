<goabx-modal
  heading="Delete case record"
  [open]="open"
  calloutVariant="emergency"
  [actions]="modalActions"
>
  <goab-text mt="none" mb="none">
    Are you sure you want to delete this case record? This action cannot be
    undone.
  </goab-text>
</goabx-modal>

<ng-template #modalActions>
  <goab-button-group alignment="end">
    <goabx-button type="tertiary" size="compact" (onClick)="onCancel()">
      Cancel
    </goabx-button>
    <goabx-button
      type="primary"
      size="compact"
      variant="destructive"
      (onClick)="onConfirm()"
    >
      Delete
    </goabx-button>
  </goab-button-group>
</ng-template>
